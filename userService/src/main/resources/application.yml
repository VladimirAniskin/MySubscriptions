spring:
  logging:
    level:
      root: INFO
      com.webriz.userservice.service: DEBUG # Уровень для сервисов
      com.webriz.userservice.repository: DEBUG # Уровень для репозиториев
      org.hibernate.SQL: DEBUG # Логирование SQL запросов
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE # Параметры SQL запросов

    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
      file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

    file:
      name: logs/user-service.log
      max-history: 7
      max-size: 10MB
  messages:
    basename: messages
    encoding: UTF-8
  application:
    name: userService
  datasource:
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
    url: jdbc:postgresql://localhost:5432/my_subscriptions
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    user: postgres
    password: postgres
    schemas: user_service
    url: jdbc:postgresql://localhost:5432/my_subscriptions
    locations: classpath:db/migration
logging:
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: TRACE
server:
  port: 8082